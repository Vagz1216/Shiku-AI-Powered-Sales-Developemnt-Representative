version: '3.8'

services:
  squad3:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENTMAIL_API_KEY=${AGENTMAIL_API_KEY}
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./logs:/app/logs
    restart: unless-stopped